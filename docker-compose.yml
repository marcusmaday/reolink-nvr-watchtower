version: '3.8'

services:
  reolink-enhanced-api:
    build:
      context: ./reolink-nvr-ha-app
      dockerfile: Dockerfile
    container_name: reolink-enhanced-api
    ports:
      - "5000:5000"
    environment:
      - NVR_HOST=192.168.1.100
      - NVR_PORT=80
      - NVR_USERNAME=admin
      - NVR_PASSWORD=password
      - NVR_SSL=false
      - BUFFER_ENABLED=true
      - BUFFER_SIZE_SECONDS=60
      - CLIP_DURATION_BEFORE=5
      - CLIP_DURATION_AFTER=5
      - RETENTION_DAYS=7
      - MAX_STORAGE_MB=5000
      - DEBUG=true
      - API_PORT=5000
      - HOME_ASSISTANT_DATA_DIR=/data/reolink
    volumes:
      - ./reolink-nvr-ha-app/app:/app
      - reolink_data:/data/reolink
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  reolink_data:
    driver: local
