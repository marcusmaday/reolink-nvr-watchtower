version: '3.8'

services:
  reolink-enhanced-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reolink-enhanced-api
    ports:
      - "5000:5000"
    environment:
      - NVR_HOST=${NVR_HOST}
      - NVR_PORT=${NVR_PORT}
      - NVR_USERNAME=${NVR_USERNAME}
      - NVR_PASSWORD=${NVR_PASSWORD}
      - NVR_SSL=${NVR_SSL}
      - DEBUG=${DEBUG}
      - BUFFER_ENABLED=true
      - BUFFER_SIZE_SECONDS=60
      - CLIP_DURATION_BEFORE=5
      - CLIP_DURATION_AFTER=5
      - RETENTION_DAYS=7
      - MAX_STORAGE_MB=5000
      - API_PORT=5000
      - HOME_ASSISTANT_DATA_DIR=/data/reolink
    volumes:
      - ./app:/app
      - reolink_data:/data/reolink
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  reolink_data:
    driver: local
