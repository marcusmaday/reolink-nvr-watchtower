---
# Maps each build architecture to its arch-specific HA base image.
# The workflow reads these values and passes them as BUILD_FROM build-args.
#
# To check for newer base image versions:
# https://github.com/home-assistant/docker-base/releases
build_from:
  amd64: "ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.21"
  aarch64: "ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.21"

labels:
  org.opencontainers.image.title: "Watchtower"
  org.opencontainers.image.description: "Camera event dashboard, clip playback, and live view for a Reolink NVR"
  org.opencontainers.image.source: "https://github.com/marcusmaday/reolink-nvr-watchtower"
  org.opencontainers.image.licenses: "MIT"
