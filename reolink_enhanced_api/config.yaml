name: "Reolink Enhanced API"
version: "0.4.24"
slug: "reolink_enhanced_api"
description: "REST + WebSocket API wrapper for Reolink NVR with event timeline and clip generation"
url: "https://github.com/marcusmaday/reolink-nvr-ha-app"
webui: "http://[HOST]:[PORT:5000]/app"
arch:
  - aarch64
  - amd64
startup: "services"
boot: "auto"
host_network: true
ingress: true
ingress_port: 5000
ingress_stream: true
panel_icon: "mdi:shield-camera"
panel_title: "Front Door Watch"
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "API server port"
image: "ghcr.io/marcusmaday/reolink-nvr-enhanced-{arch}"
options:
  api_port: 5000
  api_host: "0.0.0.0"
  nvr_host: "192.168.1.100"
  nvr_port: 80
  nvr_username: "admin"
  nvr_password: "password"
  nvr_ssl: false
  buffer_enabled: true
  buffer_size_seconds: 60
  clip_duration_before: 10
  clip_duration_after: 5
  clip_quality: "medium"
  retention_days: 7
  max_storage_mb: 5000
  external_storage_path: ""
  allow_cors: false
  debug: false
schema:
  api_port: "int(1,65535)"
  api_host: "str"
  nvr_host: "str"
  nvr_port: "int(1,65535)"
  nvr_username: "str"
  nvr_password: "password"
  nvr_ssl: "bool"
  buffer_enabled: "bool"
  buffer_size_seconds: "int(10,300)"
  clip_duration_before: "int(1,30)"
  clip_duration_after: "int(1,30)"
  clip_quality: "str"
  retention_days: "int(1,90)"
  max_storage_mb: "int(100,20000)"
  external_storage_path: "str"
  allow_cors: "bool"
  debug: "bool"
homeassistant: "2024.1.0"
