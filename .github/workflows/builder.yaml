---
name: Build and Publish Add-on

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Opt into Node.js 24 now, before the June 16 forced cutover
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Each arch is a separate job so we can pass a different BUILD_FROM to each.
    # HA's Supervisor finds the right image by looking for {image}-{arch} tags.
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.21
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.21
          # armv7 removed — no pre-built wheels for several dependencies,
          # and HA Green (the target hardware) is aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(grep '^version:' addon/config.yaml | head -1 | sed 's/version:[[:space:]]*//; s/"//g')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} for ${{ matrix.arch }}"

      - name: Set up QEMU for cross-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          # Context is the repository root so both app/ and addon/ are reachable.
          context: .
          file: ./addon/Dockerfile
          platforms: ${{ matrix.platform }}
          # This is the fix: inject the correct HA base image per architecture
          build-args: BUILD_FROM=${{ matrix.build_from }}
          push: ${{ github.event_name != 'pull_request' }}
          # HA Supervisor expects images tagged as {image}-{arch}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/reolink-nvr-enhanced-${{ matrix.arch }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/reolink-nvr-enhanced-${{ matrix.arch }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          # Scope cache per arch so jobs don't thrash each other's cache
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
