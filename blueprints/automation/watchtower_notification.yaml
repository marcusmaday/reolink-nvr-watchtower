              message: "{{ msg }}"
              source: "home_assistant"
          - action: notify.send_message
            target: !input notify_target_primary
            data:
              title: "{{ notif_title }}"
              message: "{{ msg }}"
              data:
                image: "{{ snapshot_url }}?v={{ now().timestamp() | int }}"
                clickAction: "{{ app_event_url }}"
                actions:
                  - action: URI
                    title: View Event Clip
                    uri: "{{ app_event_url }}"
          - action: notify.send_message
