blueprint:
  name: Watchtower Notification Actions
  description: >
    Send thumbnail-based camera notifications, relay supported event types into
    the app timeline, and provide either clip-open or door unlock actions.
  domain: automation
  input:
    doorbell_sensors:
      name: Doorbell sensors
      description: Optional binary sensors that turn on for a doorbell event.
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    person_sensor:
      name: Person sensor
      description: Binary sensor that turns on for a person event.
      selector:
        entity:
          domain: binary_sensor
    animal_sensors:
      name: Animal sensors
      description: Optional binary sensors that turn on for an animal event.
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    vehicle_sensors:
      name: Vehicle sensors
      description: Optional binary sensors that turn on for a vehicle event.
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    snapshot_camera:
      name: Snapshot camera
      description: Camera entity used to capture the notification thumbnail.
      selector:
        entity:
          domain: camera
    camera_name:
      name: Camera name
      description: Friendly name to show in the app timeline.
      default: Front Door
      selector:
        text: {}
    unlock_action:
      name: Optional unlock action
      description: >
        Optional action sequence to run when the doorbell notification unlock
        button is tapped. Leave this empty for cameras that do not need an
        unlock action.
      default: []
      selector:
        action: {}
    camera_channel:
      name: Camera channel
      description: >
        Zero-based NVR channel index for this camera. Reolink labels channels
        as 1-12 in the UI, but Watchtower uses indexes 0-11, so this should
        usually be the labeled channel minus 1.
      default: 8
      selector:
        number:
          min: 0
          max: 64
          mode: box
    app_base_url:
      name: App navigation path or URL
      description: >
        The Watchtower app target for mobile notifications. You can use a
        Home Assistant app navigation target like
        `homeassistant://navigate/app/15e0e6e5_watchtower`, a path like
        `/app/15e0e6e5_watchtower`, or a full Home Assistant URL. The
        blueprint will normalize non-app URLs to Home Assistant app
        navigation links so they work off Wi-Fi.
      default: "/app/15e0e6e5_watchtower"
      selector:
        text: {}
    notify_target_primary:
      name: Primary notification target
      description: Notify entity for the first phone.
      selector:
        target:
          entity:
            domain: notify
    notify_target_secondary:
      name: Secondary notification target
      description: Notify entity for the second phone.
      selector:
        target:
          entity:
            domain: notify

mode: single

triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: UNLOCK_DOOR
    id: unlock_door
  - trigger: state
    entity_id: !input doorbell_sensors
    to: "on"
    id: doorbell
  - trigger: state
    entity_id: !input person_sensor
    to: "on"
    id: person
  - trigger: state
    entity_id: !input animal_sensors
    to: "on"
    id: animal
  - trigger: state
    entity_id: !input vehicle_sensors
    to: "on"
    id: vehicle

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'unlock_door' }}"
        sequence: !input unlock_action

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'doorbell' }}"
        sequence:
          - variables:
              channel: !input camera_channel
              base_url: !input app_base_url
              cam_name: !input camera_name
              unlock_actions: !input unlock_action
              event_type: "DOORBELL"
              event_timestamp: "{{ trigger.to_state.last_changed.isoformat() if trigger.to_state is not none else now().isoformat() }}"
              event_id: "{{ channel }}_{{ event_timestamp }}_{{ event_type }}"
              snapshot_file: "/config/www/tmp/doorbell_snapshot_{{ trigger.id }}.jpg"
              snapshot_url: "/local/tmp/doorbell_snapshot_{{ trigger.id }}.jpg"
              app_target: >-
                {% set raw = (base_url | string | trim) %}
                {% if raw.startswith('homeassistant://') %}
                  {{ raw }}
                {% elif '://' in raw %}
                  {% set host_and_path = raw.split('://', 1)[1] %}
                  {% if '/' in host_and_path %}
                    {{ 'homeassistant://navigate/' ~ host_and_path.split('/', 1)[1] }}
                  {% else %}
                    {{ 'homeassistant://navigate/' }}
                  {% endif %}
                {% elif raw.startswith('/') %}
                  {{ 'homeassistant://navigate' ~ raw }}
                {% else %}
                  {{ 'homeassistant://navigate/' ~ raw }}
                {% endif %}
              app_event_url: "{{ app_target }}?channel={{ channel }}&event_type={{ event_type }}&event_id={{ event_id | urlencode }}"
              notif_title: "🔔 Doorbell"
              msg: "Someone is at the door!"
              unlock_enabled: "{{ (unlock_actions | count) > 0 }}"
          - action: camera.snapshot
            target:
              entity_id: !input snapshot_camera
            data:
              filename: "{{ snapshot_file }}"
          - delay: "00:00:01"
          - action: rest_command.reolink_ingest_event
            data:
              event_id: "{{ event_id }}"
              event_type: "{{ event_type }}"
              channel: "{{ channel }}"
              timestamp: "{{ event_timestamp }}"
              camera_name: "{{ cam_name }}"
              snapshot_url: "{{ snapshot_url }}"
              title: "{{ notif_title }}"
              message: "{{ msg }}"
              source: "home_assistant"
          - action: notify.send_message
            target: !input notify_target_primary
            data:
              title: "{{ notif_title }}"
              message: "{{ msg }}"
              data:
                image: "{{ snapshot_url }}?v={{ now().timestamp() | int }}"
                clickAction: "{{ app_event_url }}"
                actions: >-
                  {{ [
                    {"action": "UNLOCK_DOOR", "title": "Unlock"},
                    {"action": "URI", "title": "View Event Clip", "uri": app_event_url}
                  ] if unlock_enabled else [
                    {"action": "URI", "title": "View Event Clip", "uri": app_event_url}
                  ] }}
          - action: notify.send_message
            target: !input notify_target_secondary
            data:
              title: "{{ notif_title }}"
              message: "{{ msg }}"
              data:
                image: "{{ snapshot_url }}?v={{ now().timestamp() | int }}"
                clickAction: "{{ app_event_url }}"
                actions: >-
                  {{ [
                    {"action": "UNLOCK_DOOR", "title": "Unlock"},
                    {"action": "URI", "title": "View Event Clip", "uri": app_event_url}
